name: Prod Deploy

on:
  push:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      cron: ${{ steps.filter.outputs.cron }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            cron:
              - 'cron/**'
            frontend:
              - 'frontend/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push backend
        run: |
          docker build -t tisheel/backend:latest ./backend
          docker push tisheel/backend:latest

  build-cron:
    needs: changes
    if: needs.changes.outputs.cron == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push cron
        run: |
          docker build -t tisheel/cron:latest ./cron
          docker push tisheel/cron:latest

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & push frontend
        run: |
          docker build -t tisheel/frontend:latest ./frontend
          docker push tisheel/frontend:latest

  deploy:
    needs: [build-backend, build-cron, build-frontend]
    # Run deploy if every needed job either succeeded or was skipped (not changed).
    # This correctly handles the case where only a subset of services changed.
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-cron.result == 'success'    || needs.build-cron.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SECRET_KEY }}
          script: |
            set -e

            cd /home/${{ secrets.VM_USER }}/app

            # Pull latest docker-compose config from repo so server is never stale
            git pull origin main

            # Pull updated images and restart all services including nginx
            docker compose up -d --pull always backend frontend cron nginx

            # Clean up dangling images to free disk space
            docker image prune -f
